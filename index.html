<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>满月宴请帖生成器</title>
<style>
/* 加载 Serif 字体到页面 */
@font-face {
  font-family: 'QingTieSerif';
  src: url('https://cdn.jsdelivr.net/npm/@canvas-fonts/notoserifsc@1.0.0/files/noto-serif-sc-700.woff2') format('woff2');
  font-weight: bold;
  font-display: swap;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a0a0a;font-family:"QingTieSerif","SimSun","宋体","Songti SC",serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px;-webkit-tap-highlight-color:transparent;}
.page{width:100%;max-width:440px;padding:8px;}
h1{text-align:center;color:#d4a017;font-size:1.3em;letter-spacing:6px;margin-bottom:10px;}
.canvas-wrap{border:3px solid #8b6914;border-radius:10px;overflow:hidden;background:#000;position:relative;margin-bottom:12px;}
.canvas-wrap canvas{display:block;width:100%;height:auto;}
.canvas-wrap .tip{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#ffe680;padding:5px 14px;border-radius:16px;font-size:0.78em;letter-spacing:2px;pointer-events:none;white-space:nowrap;}
.input-row{background:#2c1510;border-radius:12px;padding:14px;margin-bottom:10px;}
.input-row label{display:block;color:#ffe680;font-size:1.1em;text-align:center;letter-spacing:4px;margin-bottom:10px;}
.input-row input{width:100%;padding:14px;border:3px solid #6b4a2a;border-radius:12px;background:#1a0a0a;color:#ffe680;font-size:1.6em;text-align:center;letter-spacing:10px;outline:none;-webkit-appearance:none;}
.input-row input:focus{border-color:#ffe680;}
.input-row input::placeholder{color:#553333;font-size:0.55em;letter-spacing:3px;}
.btns{display:flex;gap:8px;margin-bottom:10px;}
.btns button{flex:1;padding:16px;border:none;border-radius:14px;font-size:1.1em;font-weight:bold;letter-spacing:4px;cursor:pointer;}
.btn-main{background:linear-gradient(180deg,#ffe680,#c9a020);color:#3d0000;font-size:1.2em!important;box-shadow:0 4px 16px rgba(200,160,30,0.35);}
.btn-main:active{transform:scale(0.96);}
.btn-sub{background:#4a2820;color:#d4a017;border:2px solid #8b6914!important;}
.result-area{background:#2c1510;border-radius:12px;padding:12px;display:none;}
.result-area.show{display:block;}
.result-area img{width:100%;border-radius:8px;display:block;}
.result-area .save-tip{text-align:center;color:#d4a017;font-size:0.85em;margin-top:10px;letter-spacing:2px;}
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,0.9);color:#ffe680;padding:18px 28px;border-radius:14px;font-size:1.1em;letter-spacing:3px;z-index:999;transition:transform 0.2s;pointer-events:none;border:2px solid #8b6914;}
.toast.show{transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>
<div class="page">
  <h1>🧧 满月宴请帖 🧧</h1>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="previewCanvas"></canvas>
    <div class="tip" id="posTip">👆 点击下划线位置定位名字</div>
  </div>
  <div class="input-row">
    <label>请输入客人姓名</label>
    <input type="text" id="nameInput" placeholder="如：张三" maxlength="6">
  </div>
  <div class="btns">
    <button class="btn-main" id="btnGenerate">📋 生成请帖</button>
    <button class="btn-sub" id="btnReset">🔄 重新定位</button>
  </div>
  <div class="result-area" id="resultArea">
    <img id="resultImg" alt="请帖图片 - 长按保存到相册">
    <div class="save-tip">⬆ 长按上方图片 → 选择"保存图片"</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var canvas = document.getElementById('previewCanvas');
var ctx = canvas.getContext('2d');

// 预览用小图：206KB，秒开
var previewImg = new Image();
previewImg.src = '满月宴请帖_预览.jpg';

// 原图：2.3MB，生成时用
var fullImg = new Image();
fullImg.src = '满月宴请帖.png';
var fullReady = false;
fullImg.onload = function(){ fullReady = true; };

var FULL_W = 5760, FULL_H = 11296;
var nameX = 2880, nameY = 3200, nameFontSize = 280;
var scale = 1;
var guestName = '';
var posSet = false;

// ===== 字体加载完成后再初始化 =====
var FONT_FAMILY = '"QingTieSerif","SimSun","宋体","Songti SC","Noto Serif CJK SC",serif';

// 等待 Web 字体加载
document.fonts.ready.then(function(){
  previewImg.onload = function(){
    resizeCanvas();
    drawPreview();
  };
  // 如果图片已加载，手动触发
  if(previewImg.complete){ previewImg.onload(); }
});

// 备用：如果字体没加载（超时），用系统宋体
setTimeout(function(){
  if(!document.fonts.check('bold 16px ' + FONT_FAMILY)){
    console.log('Web字体加载失败，使用系统字体');
    FONT_FAMILY = '"SimSun","宋体","Songti SC","STSong",serif';
  }
}, 3000);

function resizeCanvas(){
  var wrap = document.getElementById('canvasWrap');
  var maxW = wrap.clientWidth;
  var maxH = window.innerHeight * 0.42;
  var w = maxW, h = w * (FULL_H / FULL_W);
  if(h > maxH){ h = maxH; w = h * (FULL_W / FULL_H); }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;
  ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);
  scale = w / FULL_W;
}

function drawPreview(){
  var w = canvas.width / window.devicePixelRatio;
  var h = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(previewImg,0,0,w,h);

  if(!guestName.trim()){
    if(posSet){
      var sx = nameX * scale, sy = nameY * scale;
      ctx.strokeStyle = 'rgba(255,215,0,0.7)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8,6]);
      ctx.beginPath();
      ctx.moveTo(sx-50,sy); ctx.lineTo(sx+50,sy);
      ctx.moveTo(sx,sy-50); ctx.lineTo(sx,sy+50);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    return;
  }

  var sx = nameX * scale, sy = nameY * scale, fs = nameFontSize * scale;
  ctx.save();
  ctx.translate(sx,sy);
  ctx.fillStyle = '#ffe680';
  ctx.font = 'bold ' + fs + 'px ' + FONT_FAMILY;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if(guestName.length === 2) ctx.fillText(guestName[0]+'　'+guestName[1],0,0);
  else ctx.fillText(guestName,0,0);
  ctx.restore();
}

canvas.addEventListener('click', function(e){
  var rect = canvas.getBoundingClientRect();
  nameX = Math.round((e.clientX - rect.left) / scale);
  nameY = Math.round((e.clientY - rect.top) / scale);
  posSet = true;
  document.getElementById('posTip').textContent = '✅ 名字位置已设置（点击可重设）';
  drawPreview();
  showToast('✅ 位置已设定！输入名字即可');
});

canvas.addEventListener('touchend', function(e){
  if(e.changedTouches.length===1){
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    nameX = Math.round((e.changedTouches[0].clientX - rect.left) / scale);
    nameY = Math.round((e.changedTouches[0].clientY - rect.top) / scale);
    posSet = true;
    document.getElementById('posTip').textContent = '✅ 名字位置已设置（点击可重设）';
    drawPreview();
    showToast('✅ 位置已设定！输入名字即可');
  }
}, {passive:false});

document.getElementById('nameInput').addEventListener('input', function(e){
  guestName = e.target.value.trim();
  drawPreview();
});

document.getElementById('btnGenerate').addEventListener('click', function(){
  if(!guestName){ showToast('⚠️ 请先输入姓名'); return; }
  if(!posSet){ showToast('⚠️ 请先在图片上点击定位'); return; }
  showToast('⏳ 正在生成高清图片...');

  function doit(){
    if(!fullReady){ setTimeout(doit,150); return; }
    var OUT_W = 2000;
    var outScale = OUT_W / FULL_W;
    var OUT_H = Math.round(FULL_H * outScale);
    var rc = document.createElement('canvas');
    rc.width = OUT_W; rc.height = OUT_H;
    var rctx = rc.getContext('2d');
    rctx.drawImage(fullImg, 0, 0, OUT_W, OUT_H);
    rctx.save();
    rctx.translate(nameX * outScale, nameY * outScale);
    rctx.fillStyle = '#ffe680';
    rctx.font = 'bold ' + Math.round(nameFontSize * outScale) + 'px ' + FONT_FAMILY;
    rctx.textAlign = 'center';
    rctx.textBaseline = 'middle';
    if(guestName.length===2) rctx.fillText(guestName[0]+'　'+guestName[1],0,0);
    else rctx.fillText(guestName,0,0);
    rctx.restore();

    rc.toBlob(function(blob){
      var url = URL.createObjectURL(blob);
      document.getElementById('resultImg').src = url;
      document.getElementById('resultArea').classList.add('show');
      showToast('✅ 请长按图片保存到相册');
      document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
    },'image/jpeg',0.85);
  }
  doit();
});

document.getElementById('btnReset').addEventListener('click', function(){
  posSet = false;
  guestName = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('posTip').textContent = '👆 点击下划线位置定位名字';
  document.getElementById('resultArea').classList.remove('show');
  drawPreview();
  showToast('🔄 已重置，请重新定位');
});

var _tid;
function showToast(m){
  var t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(_tid);
  _tid = setTimeout(function(){ t.classList.remove('show'); },2000);
}

window.addEventListener('resize',function(){ resizeCanvas(); drawPreview(); });
</script>
</body>
</html>
